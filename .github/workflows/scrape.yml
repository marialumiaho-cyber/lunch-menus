name: Scrape Weekly Menus

on:
  schedule:
    # Every Monday at 05:00 UTC = 07:00 Helsinki time (EET/EEST)
    - cron: "0 5 * * 1"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic httpx beautifulsoup4

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scrape.py

      - name: Commit updated menus.json
        run: |
          git config user.name "lunch-bot"
          git config user.email "lunch-bot@users.noreply.github.com"
          git add docs/menus.json
          git diff --staged --quiet || git commit -m "chore: update menus for week $(date +'%d.%m.%Y')"
          git push

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages

  # Separate job to upload the docs/ folder as a Pages artifact
  upload-pages-artifact:
    runs-on: ubuntu-latest
    needs: scrape-and-deploy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # pick up the freshly committed menus.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
