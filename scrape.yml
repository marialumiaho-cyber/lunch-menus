name: Scrape Weekly Menus

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic httpx beautifulsoup4

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scrape.py

      - name: Commit updated menus.json
        run: |
          git config user.name "lunch-bot"
          git config user.email "lunch-bot@users.noreply.github.com"
          git add docs/menus.json
          git diff --staged --quiet || git commit -m "chore: update menus for week $(date +'%d.%m.%Y')"
          git push
