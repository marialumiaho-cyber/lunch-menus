<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lounasdashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --card: #ffffff;
    --border: #e4eaf0;
    --accent: #00bcd4;
    --accent-dark: #0097a7;
    --accent-light: #e0f7fa;
    --text: #2d3748;
    --text-muted: #718096;
    --text-dim: #a0aec0;
    --green: #38a169;
    --green-light: #f0fff4;
    --red: #e53e3e;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-hover: 0 6px 24px rgba(0,188,212,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    padding: 1.25rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 1px 0 var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .brand { display: flex; align-items: center; gap: 0.75rem; }

  .brand-icon {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .brand-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .brand-sub {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 0.05rem;
  }

  .week-badge {
    background: var(--accent-light);
    color: var(--accent-dark);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.4rem 0.9rem;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* ── Day nav ── */
  nav {
    background: var(--surface);
    padding: 0 2.5rem;
    display: flex;
    gap: 0.25rem;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }

  nav::-webkit-scrollbar { display: none; }

  .day-btn {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 0.9rem 1.1rem 0.75rem;
    cursor: pointer;
    transition: all 0.18s ease;
    white-space: nowrap;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
    margin-bottom: -1px;
  }

  .day-btn .day-name {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .day-btn .day-date {
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--text);
    width: 28px; height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.18s;
  }

  .day-btn:hover { border-bottom-color: var(--accent-light); }
  .day-btn:hover .day-name { color: var(--accent); }
  .day-btn:hover .day-date { color: var(--accent); }

  .day-btn.active { border-bottom-color: var(--accent); }
  .day-btn.active .day-name { color: var(--accent); }
  .day-btn.active .day-date { color: var(--accent-dark); }

  .day-btn.is-today .day-date {
    background: var(--accent);
    color: #fff !important;
  }

  /* ── Main content ── */
  .main {
    padding: 2rem 2.5rem 3rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .panel-header {
    margin-bottom: 1.5rem;
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .panel-title {
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .panel-subtitle {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 400;
  }

  .today-pill {
    background: var(--accent);
    color: #fff;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
  }

  .restaurant-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 1.5rem;
  }

  /* ── Cards ── */
  .restaurant-card {
    background: var(--card);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.2s, transform 0.2s;
  }

  .restaurant-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }

  .card-header {
    padding: 1.25rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
  }

  .restaurant-name {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1.3;
  }

  .restaurant-meta {
    font-size: 0.68rem;
    color: var(--text-muted);
    margin-top: 0.2rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .restaurant-meta::before { content: '📍'; font-size: 0.6rem; }

  .price-badge {
    background: var(--accent-light);
    color: var(--accent-dark);
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-body { padding: 1.1rem 1.5rem; flex: 1; }

  .menu-section { margin-bottom: 1.1rem; }
  .menu-section:last-child { margin-bottom: 0; }

  .section-label {
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 700;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .menu-item {
    font-size: 0.79rem;
    color: var(--text);
    line-height: 1.55;
    padding: 0.2rem 0;
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
  }

  .menu-item::before {
    content: '•';
    color: var(--accent);
    flex-shrink: 0;
    font-size: 0.8rem;
    margin-top: 0.1rem;
  }

  .tags { font-size: 0.62rem; color: var(--text-dim); margin-left: 0.25rem; font-style: italic; }

  .vegan-tag {
    display: inline-block;
    background: var(--green-light);
    color: var(--green);
    font-size: 0.55rem;
    padding: 0.1rem 0.35rem;
    border-radius: 4px;
    font-style: normal;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-left: 0.3rem;
    vertical-align: middle;
  }

  .card-footer {
    padding: 0.8rem 1.5rem;
    border-top: 1px solid var(--border);
    background: #fafcff;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .hours {
    font-size: 0.7rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-weight: 500;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 2px var(--green-light);
  }

  .link {
    font-size: 0.7rem;
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.15s;
  }

  .link:hover { color: var(--accent-dark); }

  /* ── States ── */
  .day-panel { display: none; }
  .day-panel.active { display: block; }

  .error-card {
    background: #fff5f5;
    border: 1px solid #fed7d7;
    border-radius: 14px;
    padding: 1.5rem;
    color: var(--red);
    font-size: 0.8rem;
    grid-column: 1 / -1;
  }

  .state-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 40vh;
    gap: 1rem;
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    header, nav { padding-left: 1rem; padding-right: 1rem; }
    .main { padding: 1.25rem 1rem 2rem; }
    .brand-title { font-size: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">🍽️</div>
    <div>
      <div class="brand-title">Lounasdashboard</div>
      <div class="brand-sub">Lähiravintolat · Helsinki</div>
    </div>
  </div>
  <div class="week-badge" id="weekLabel">Ladataan...</div>
</header>

<nav id="dayNav"></nav>

<div class="main" id="mainContent">
  <div class="state-screen"><div class="spinner"></div>Haetaan menuita...</div>
</div>

<script>
const DAYS_FI   = ['Sunnuntai','Maanantai','Tiistai','Keskiviikko','Torstai','Perjantai','Lauantai'];
const DAYS_SHORT = ['Su','Ma','Ti','Ke','To','Pe','La'];
const WEEKDAYS  = [1,2,3,4,5];

function getMondayOfWeek(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  return d;
}

function getDateForDow(dow) {
  const monday = getMondayOfWeek(new Date());
  const d = new Date(monday);
  d.setDate(monday.getDate() + (dow - 1));
  return d;
}

// ── Render helpers ────────────────────────────────────────────────────────────

function renderItems(arr) {
  if (!arr || arr.length === 0) return '';
  return arr.map(i => {
    const isVegan = /VGN/i.test(i);
    const tagsMatch = i.match(/\(([A-Z,\s]+)\)/gi);
    const tags = tagsMatch ? tagsMatch.map(t => t.replace(/[()]/g,'')).join(', ') : '';
    const clean = i.replace(/\s*\([A-Z,\s]+\)\s*/gi, ' ').trim();
    return `<div class="menu-item"><span>${clean}${isVegan ? '<span class="vegan-tag">VGN</span>' : ''}<span class="tags">${tags}</span></span></div>`;
  }).join('');
}

function renderSection(label, items) {
  if (!items || items.length === 0) return '';
  return `<div class="menu-section"><div class="section-label">${label}</div>${renderItems(items)}</div>`;
}

function renderCard(restaurant, dayKey) {
  const menu = restaurant.daily_menus?.[dayKey] || restaurant.daily_menus?.[String(dayKey)];

  const headerHtml = `
    <div class="card-header">
      <div>
        <div class="restaurant-name">${restaurant.name}</div>
        <div class="restaurant-meta">${restaurant.address}</div>
      </div>
      ${restaurant.prices?.[0] ? `<div class="price-badge">${restaurant.prices[0]}</div>` : ''}
    </div>`;

  const footerHtml = `
    <div class="card-footer">
      <div class="hours"><div class="dot"></div>${restaurant.hours}</div>
      <a href="${restaurant.url}" target="_blank" class="link">Avaa sivusto ↗</a>
    </div>`;

  if (restaurant.error)
    return `<div class="error-card">⚠ ${restaurant.name}: ${restaurant.error}</div>`;

  if (!menu)
    return `<div class="restaurant-card">${headerHtml}
      <div class="card-body" style="color:var(--text-dim);font-size:0.8rem;padding:1.5rem">Ei lounasta tänään.</div>
      ${footerHtml}</div>`;

  const body = [
    renderSection('Salaattipöytä', restaurant.common_items),
    renderSection('Keitto', menu.soups),
    renderSection('Lämmin ruoka', menu.mains),
    renderSection('Vegaaninen vaihtoehto', menu.vegan),
  ].join('');

  return `<div class="restaurant-card">${headerHtml}<div class="card-body">${body}</div>${footerHtml}</div>`;
}

// ── Day switching ─────────────────────────────────────────────────────────────

function selectDay(dow) {
  document.querySelectorAll('.day-btn').forEach(b =>
    b.classList.toggle('active', +b.dataset.day === dow));
  document.querySelectorAll('.day-panel').forEach(p =>
    p.classList.toggle('active', p.id === `panel-${dow}`));
}

// ── Build UI ──────────────────────────────────────────────────────────────────

function buildDashboard(data) {
  const today    = new Date();
  const todayDow = today.getDay();
  const activeDay = WEEKDAYS.includes(todayDow) ? todayDow : 1;

  document.getElementById('weekLabel').textContent = `Viikko ${data.week_label || '—'}`;

  // Nav with day name + date number
  const nav = document.getElementById('dayNav');
  nav.innerHTML = '';
  WEEKDAYS.forEach(dow => {
    const d = getDateForDow(dow);
    const isToday = dow === todayDow;
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (isToday ? ' is-today' : '') + (dow === activeDay ? ' active' : '');
    btn.dataset.day = dow;
    btn.innerHTML = `<span class="day-name">${DAYS_SHORT[dow]}</span><span class="day-date">${d.getDate()}</span>`;
    btn.addEventListener('click', () => selectDay(+btn.dataset.day));
    nav.appendChild(btn);
  });

  // Panels
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  WEEKDAYS.forEach(dow => {
    const panel = document.createElement('div');
    panel.className = 'day-panel' + (dow === activeDay ? ' active' : '');
    panel.id = `panel-${dow}`;

    const d = getDateForDow(dow);
    const dateStr = d.toLocaleDateString('fi-FI', { day: 'numeric', month: 'long', year: 'numeric' });
    const isToday = dow === todayDow;
    const grid = (data.restaurants || []).map(r => renderCard(r, String(dow))).join('');

    panel.innerHTML = `
      <div class="panel-header">
        <div class="panel-title">
          ${isToday ? '<span class="today-pill">Tänään</span>' : ''}
          ${DAYS_FI[dow]}
        </div>
        <div class="panel-subtitle">${dateStr}</div>
      </div>
      <div class="restaurant-grid">${grid}</div>`;
    main.appendChild(panel);
  });
}

// ── Load data ─────────────────────────────────────────────────────────────────

async function loadMenus() {
  try {
    const res = await fetch('menus.json?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    buildDashboard(data);
  } catch (err) {
    document.getElementById('mainContent').innerHTML = `
      <div class="state-screen">
        <div style="font-size:2rem">⚠️</div>
        <div>Menuja ei voitu ladata.<br><span style="font-size:0.75rem;color:var(--text-dim)">${err.message}</span></div>
      </div>`;
  }
}

loadMenus();
</script>
</body>
</html>
